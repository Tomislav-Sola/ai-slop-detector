# Builds the Docker image and publishes it to GHCR on every semver tag push.
# The Action's runtime image is pulled from GHCR (see action.yml), so a tag
# without a matching image means consumers on @v1 will fail to pull.
#
# Trigger order at release time:
#   1. Push tag `vX.Y.Z` on the release commit.
#   2. This workflow fires, builds the image, pushes to ghcr.io with tags
#      :vX.Y.Z, :vX.Y, :vX, :latest (via docker/metadata-action's semver
#      patterns).
#   3. Floating tags `:vX` and `:vX.Y` then resolve to the new image.
#
# The GHCR package must be set to PUBLIC visibility (Settings → Package
# settings → Change visibility) for GitHub-hosted runners in other repos
# to pull it without auth. GHCR defaults to private even when the source
# repo is public.

name: Release Docker image to GHCR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Hardcoded lowercase path. github.repository_owner returns
          # mixed-case ("Tomislav-Sola") which Docker accepts but is non-idiomatic.
          images: ghcr.io/tomislav-sola/ai-slop-detector
          # v-prefixed image tags so they mirror the git tag scheme
          # (`:v1.1.1`, `:v1.1`, `:v1`) and match what action.yml references.
          # docker/metadata-action's semver patterns strip the v by default.
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
